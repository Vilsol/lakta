name: Renovate

on:
  schedule:
    - cron: "0 2 * * *" # nightly 02:00 UTC
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
        type: choice
        options:
          - debug
          - info
          - warn

permissions:
  contents: read

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Trusted host-side allowlist: only commands matching these regexes may run
          # via postUpgradeTasks in renovate.json. Repo config can never self-authorize shell.
          RENOVATE_ALLOWED_COMMANDS: '["^GOWORK=off go list -m all "]'
          # Since Renovate v42.68.5 postUpgradeTasks no longer run in a shell by default,
          # so the golden-regen env-assign/pipe/redirect break. Re-enable shell execution
          # (self-hosted-only flag; cannot be set from untrusted renovate.json).
          RENOVATE_ALLOW_SHELL_EXECUTOR_FOR_POST_UPGRADE_COMMANDS: "true"
