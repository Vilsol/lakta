name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Build
        run: go build ./...

      - name: Test
        run: mise run test

      - name: Race
        run: go test -race ./...

      - name: Lint
        run: mise run lint

      - name: Vulnerability check
        run: mise run govulncheck

      - name: Doc check
        run: mise run doccheck

      - name: Docs up to date
        run: mise run docgen-check

      - name: API index up to date
        run: mise run apicheck
