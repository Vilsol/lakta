name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      # PR checkouts are single-ref; buf breaking needs the origin/main baseline.
      - name: Fetch main as proto-breaking baseline
        run: git fetch origin main

      - name: Build, test, lint, vuln (all modules)
        run: mise run ci-all

      - name: Dependency isolation
        run: mise run verify-isolation

      - name: Doc check
        run: mise run doccheck

      - name: Docs up to date
        run: mise run docgen-check

      - name: Schema up to date
        run: mise run schema-check

      - name: API index up to date
        run: mise run apicheck

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      # pgx uses testcontainers (Docker-in-runner); db/sql uses the postgres
      # service above; temporal self-downloads a dev server via the integration tag.
      - name: Integration tests (DB + Temporal)
        run: mise run test-integration
