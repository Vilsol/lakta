name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      # Go module + build cache (cached test results live in the build cache,
      # so unchanged packages skip their tests too) and the govulncheck DB.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/.cache/go/vulndb
          key: ${{ runner.os }}-go-ci-${{ hashFiles('**/go.sum', 'go.work.sum') }}
          restore-keys: ${{ runner.os }}-go-ci-

      # ci-all keeps per-module lint caches under <git-common-dir>/golangci-lint-cache.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .git/golangci-lint-cache
          key: ${{ runner.os }}-lint-${{ hashFiles('**/go.sum', '.golangci.yaml') }}
          restore-keys: ${{ runner.os }}-lint-

      # PR checkouts are single-ref; buf breaking needs the origin/main baseline.
      - name: Fetch main as proto-breaking baseline
        run: git fetch origin main

      - name: Build, test, lint, vuln (all modules)
        run: mise run ci-all

      - name: Dependency isolation
        run: mise run verify-isolation

      - name: Doc check
        run: mise run doccheck

      - name: Docs up to date
        run: mise run docgen-check

      - name: Schema up to date
        run: mise run schema-check

      - name: API index up to date
        run: mise run apicheck

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      # Separate key from the ci job: integration builds carry different tags,
      # so sharing a key would let one job's save shadow the other's contents.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-integration-${{ hashFiles('**/go.sum', 'go.work.sum') }}
          restore-keys: ${{ runner.os }}-go-integration-

      # pgx uses testcontainers (Docker-in-runner); db/sql uses the postgres
      # service above; temporal self-downloads a dev server via the integration tag.
      - name: Integration tests (DB + Temporal)
        run: mise run test-integration
