name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4

      - name: Build, test, lint, vuln (all modules)
        run: mise run ci-all

      - name: Dependency isolation
        run: mise run verify-isolation

      - name: Doc check
        run: mise run doccheck

      - name: Docs up to date
        run: mise run docgen-check

      - name: API index up to date
        run: mise run apicheck
