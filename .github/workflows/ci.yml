name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4

      - name: Build
        run: go build ./...

      - name: Test
        run: mise run test

      - name: Race
        run: go test -race ./...

      - name: Lint
        run: mise run lint

      - name: Vulnerability check
        run: mise run govulncheck

      - name: Doc check
        run: mise run doccheck

      - name: Docs up to date
        run: mise run docgen-check

      - name: API index up to date
        run: mise run apicheck
