modules:
  - category: auth
    type: verifier
    package: github.com/Vilsol/lakta/pkg/auth/verifier
    configPath: modules.auth.verifier.<name>
    description: is unmarshaled from modules.auth.verifier.<instance>
    fields:
      - key: issuers
        type: '[]verifier.IssuerConfig'
        envVar: LAKTA_MODULES__AUTH__VERIFIER__<NAME>__ISSUERS
      - key: static_key
        type: '*verifier.StaticKey'
        envVar: LAKTA_MODULES__AUTH__VERIFIER__<NAME>__STATIC_KEY
      - key: scope_claim
        type: string
        default: scope
        envVar: LAKTA_MODULES__AUTH__VERIFIER__<NAME>__SCOPE_CLAIM
      - key: roles_claim
        type: string
        envVar: LAKTA_MODULES__AUTH__VERIFIER__<NAME>__ROLES_CLAIM
  - category: cache
    type: memory
    package: github.com/Vilsol/lakta/pkg/cache/memory
    configPath: modules.cache.memory.<name>
    description: 'mirrors pool.Config: config Caches overlay code-only CodeCaches by name'
    fields:
      - key: caches
        type: map[string]memory.Spec
        envVar: LAKTA_MODULES__CACHE__MEMORY__<NAME>__CACHES
        description: caches holds config-declared caches. Prefer snake_case names; hyphens
    codeOnly:
      - option: WithCache
        type: map[string]memory.Spec
        description: registers a cache in code (code-only); config with the same name
  - category: db
    type: pgx
    package: github.com/Vilsol/lakta/pkg/db/drivers/pgx
    configPath: modules.db.pgx.<name>
    description: represents configuration for SQL Databse [Module]
    fields:
      - key: dsn
        type: string
        required: true
        envVar: LAKTA_MODULES__DB__PGX__<NAME>__DSN
        description: dSN is the database connection string used to configure the database connection
      - key: max_open_conns
        type: int32
        default: "10"
        envVar: LAKTA_MODULES__DB__PGX__<NAME>__MAX_OPEN_CONNS
        description: maxOpenConns specifies the maximum number of open connections to the database. It maps to the "max_open_conns" configuration
      - key: log_level
        type: string
        default: info
        enum: trace,debug,info,warn,error,none
        envVar: LAKTA_MODULES__DB__PGX__<NAME>__LOG_LEVEL
        description: logLevel specifies the logging level for database operations, supporting values like trace, debug, info, warn, error, none
      - key: health_check
        type: bool
        envVar: LAKTA_MODULES__DB__PGX__<NAME>__HEALTH_CHECK
        description: healthCheck enables or disables the database health check mechanism
      - key: min_conns
        type: int32
        envVar: LAKTA_MODULES__DB__PGX__<NAME>__MIN_CONNS
        description: minConns is the minimum number of idle connections kept in the pool
      - key: max_conn_lifetime
        type: time.Duration
        default: 1h0m0s
        envVar: LAKTA_MODULES__DB__PGX__<NAME>__MAX_CONN_LIFETIME
        description: maxConnLifetime is the maximum age of a connection before it is closed
      - key: max_conn_idle_time
        type: time.Duration
        default: 30m0s
        envVar: LAKTA_MODULES__DB__PGX__<NAME>__MAX_CONN_IDLE_TIME
        description: maxConnIdleTime is the maximum idle time before a connection is closed
      - key: health_check_period
        type: time.Duration
        default: 1m0s
        envVar: LAKTA_MODULES__DB__PGX__<NAME>__HEALTH_CHECK_PERIOD
        description: healthCheckPeriod is how often the pool checks idle connection health
      - key: statement_timeout
        type: time.Duration
        default: 30s
        envVar: LAKTA_MODULES__DB__PGX__<NAME>__STATEMENT_TIMEOUT
        description: statementTimeout sets the per-statement timeout (Postgres statement_timeout). Zero disables it
      - key: migrations
        type: pgx.MigrationsConfig
        description: migrations configures goose-driven schema migrations for this instance
        fields:
          - key: run_on_start
            type: bool
            envVar: LAKTA_MODULES__DB__PGX__<NAME>__MIGRATIONS__RUN_ON_START
            description: runOnStart applies pending migrations during StartAsync. Default false —
          - key: table
            type: string
            default: schema_migrations
            envVar: LAKTA_MODULES__DB__PGX__<NAME>__MIGRATIONS__TABLE
            description: table is the migration history table name
          - key: dir
            type: string
            default: migrations
            envVar: LAKTA_MODULES__DB__PGX__<NAME>__MIGRATIONS__DIR
            description: dir is the sub-path within the embedded FS that holds the .sql files
          - key: lock
            type: string
            default: advisory
            enum: advisory,none
            envVar: LAKTA_MODULES__DB__PGX__<NAME>__MIGRATIONS__LOCK
            description: 'lock selects the on-start locking strategy: "advisory" uses a Postgres'
          - key: allow_missing
            type: bool
            envVar: LAKTA_MODULES__DB__PGX__<NAME>__MIGRATIONS__ALLOW_MISSING
            description: allowMissing applies out-of-order (missing) migrations instead of erroring
  - category: debug
    type: actuator
    package: github.com/Vilsol/lakta/pkg/debug/actuator
    configPath: modules.debug.actuator.<name>
    description: represents configuration for the actuator [Module]. Defaults are
    fields:
      - key: enabled
        type: bool
        envVar: LAKTA_MODULES__DEBUG__ACTUATOR__<NAME>__ENABLED
        description: enabled gates the whole module; when false Init/Start are no-ops. Default false
      - key: host
        type: string
        default: 127.0.0.1
        envVar: LAKTA_MODULES__DEBUG__ACTUATOR__<NAME>__HOST
        description: host to bind the private actuator listener. Default 127.0.0.1
      - key: port
        type: uint16
        default: "6060"
        envVar: LAKTA_MODULES__DEBUG__ACTUATOR__<NAME>__PORT
        description: port to bind. Default 6060
      - key: base_path
        type: string
        default: /debug
        envVar: LAKTA_MODULES__DEBUG__ACTUATOR__<NAME>__BASE_PATH
        description: basePath prefixes every endpoint. Default /debug
      - key: show_values
        type: string
        default: never
        enum: never,always,when_authorized
        envVar: LAKTA_MODULES__DEBUG__ACTUATOR__<NAME>__SHOW_VALUES
        description: 'showValues controls config-value masking: never|always|when_authorized'
      - key: redact_patterns
        type: '[]string'
        envVar: LAKTA_MODULES__DEBUG__ACTUATOR__<NAME>__REDACT_PATTERNS
        description: redactPatterns extends (does not replace) the default key-redaction set
      - key: endpoints
        type: actuator.EndpointToggles
        description: endpoints toggles optional endpoint groups. All default true
        fields:
          - key: pprof
            type: bool
            default: "true"
            envVar: LAKTA_MODULES__DEBUG__ACTUATOR__<NAME>__ENDPOINTS__PPROF
          - key: expvar
            type: bool
            default: "true"
            envVar: LAKTA_MODULES__DEBUG__ACTUATOR__<NAME>__ENDPOINTS__EXPVAR
          - key: ui
            type: bool
            default: "true"
            envVar: LAKTA_MODULES__DEBUG__ACTUATOR__<NAME>__ENDPOINTS__UI
          - key: loggers
            type: bool
            default: "true"
            envVar: LAKTA_MODULES__DEBUG__ACTUATOR__<NAME>__ENDPOINTS__LOGGERS
      - key: allow_insecure
        type: bool
        envVar: LAKTA_MODULES__DEBUG__ACTUATOR__<NAME>__ALLOW_INSECURE
        description: allowInsecure downgrades the fail-closed security refusals (non-loopback
    codeOnly:
      - option: WithMount
        type: fiber.Router
        description: mounts endpoints under the caller's router instead of a private
      - option: WithAuth
        type: ""
        description: sets the auth middleware gating sensitive endpoints (code-only)
  - category: events
    type: bus
    package: github.com/Vilsol/lakta/pkg/events/bus
    configPath: modules.events.bus.<name>
    description: represents configuration for the event bus [Module]
    fields:
      - key: buffer_size
        type: int
        default: "1024"
        envVar: LAKTA_MODULES__EVENTS__BUS__<NAME>__BUFFER_SIZE
        description: bufferSize is the queue capacity for each async subscription
  - category: features
    type: flags
    package: github.com/Vilsol/lakta/pkg/features/flags
    configPath: modules.features.flags.<name>
    description: represents configuration for the feature flags [Module]
    fields:
      - key: flags
        type: map[string]any
        envVar: LAKTA_MODULES__FEATURES__FLAGS__<NAME>__FLAGS
        description: 'flags holds the raw flag definitions: scalars for plain values, or'
  - category: grpc
    type: client
    package: github.com/Vilsol/lakta/pkg/grpc/client
    configPath: modules.grpc.client.<name>
    description: holds gRPC client connection settings
    fields:
      - key: target
        type: string
        default: localhost:50051
        envVar: LAKTA_MODULES__GRPC__CLIENT__<NAME>__TARGET
        description: target specifies the target address for the gRPC client connection
      - key: insecure
        type: bool
        envVar: LAKTA_MODULES__GRPC__CLIENT__<NAME>__INSECURE
        description: insecure determines whether transport credentials should use an insecure configuration
      - key: tls
        type: config.TLS
        envVar: LAKTA_MODULES__GRPC__CLIENT__<NAME>__TLS
        description: tLS configures file-path based transport security (client cert for mutual
    codeOnly:
      - option: WithCredentials
        type: credentials.TransportCredentials
        description: sets explicit transport credentials, overriding Insecure and
      - option: WithClient
        type: '[]client.ClientRegistrar'
        description: registers a typed client constructor (code-only)
  - category: grpc
    type: server
    package: github.com/Vilsol/lakta/pkg/grpc/server
    configPath: modules.grpc.server.<name>
    description: represents configuration for GRPC server [Module]
    fields:
      - key: host
        type: string
        default: 0.0.0.0
        envVar: LAKTA_MODULES__GRPC__SERVER__<NAME>__HOST
        description: host specifies the address for the GRPC server to bind to
      - key: port
        type: uint16
        default: "50051"
        envVar: LAKTA_MODULES__GRPC__SERVER__<NAME>__PORT
        description: port represents the port number on which the GRPC server listens
      - key: health_check
        type: bool
        envVar: LAKTA_MODULES__GRPC__SERVER__<NAME>__HEALTH_CHECK
        description: healthCheck determines whether gRPC health checking is enabled or disabled
      - key: tls
        type: config.TLS
        envVar: LAKTA_MODULES__GRPC__SERVER__<NAME>__TLS
        description: tLS configures file-path based transport security. When unset the server
    codeOnly:
      - option: WithService
        type: map[*grpc.ServiceDesc]any
        description: adds service to the list of services to be registered (code-only)
      - option: WithCredentials
        type: credentials.TransportCredentials
        description: sets explicit transport credentials, overriding TLS file
      - option: WithUnaryInterceptor
        type: '[]grpc.UnaryServerInterceptor'
        description: appends a unary interceptor, applied after the built-in
      - option: WithStreamInterceptor
        type: '[]grpc.StreamServerInterceptor'
        description: appends a stream interceptor, applied after the built-in
  - category: health
    type: health
    package: github.com/Vilsol/lakta/pkg/health
    configPath: modules.health.health.<name>
    description: represents configuration for health check [Module]
    fields:
      - key: component_name
        type: string
        envVar: LAKTA_MODULES__HEALTH__HEALTH__<NAME>__COMPONENT_NAME
        description: componentName defines the name of the component
      - key: component_version
        type: string
        envVar: LAKTA_MODULES__HEALTH__HEALTH__<NAME>__COMPONENT_VERSION
        description: componentVersion represents the version of the component
    codeOnly:
      - option: WithCheck
        type: '[]health.Config'
        description: adds a health check to be registered on initialization (code-only)
  - category: http
    type: connect
    package: github.com/Vilsol/lakta/pkg/http/connect
    configPath: modules.http.connect.<name>
    description: represents configuration for the Connect-RPC server [Module]. One
    fields:
      - key: host
        type: string
        default: 0.0.0.0
        envVar: LAKTA_MODULES__HTTP__CONNECT__<NAME>__HOST
        description: host specifies the address for the server to bind to
      - key: port
        type: uint16
        default: "8080"
        envVar: LAKTA_MODULES__HTTP__CONNECT__<NAME>__PORT
        description: port represents the port number on which the server listens
      - key: h2c
        type: bool
        default: "true"
        envVar: LAKTA_MODULES__HTTP__CONNECT__<NAME>__H2C
        description: h2C enables cleartext HTTP/2 (h2c) so gRPC clients work without TLS. When
      - key: read_timeout
        type: time.Duration
        envVar: LAKTA_MODULES__HTTP__CONNECT__<NAME>__READ_TIMEOUT
        description: readTimeout bounds reading the entire request incl. body (maps to
      - key: read_header_timeout
        type: time.Duration
        default: 10s
        envVar: LAKTA_MODULES__HTTP__CONNECT__<NAME>__READ_HEADER_TIMEOUT
        description: readHeaderTimeout bounds reading request headers (maps to
      - key: tls
        type: config.TLS
        envVar: LAKTA_MODULES__HTTP__CONNECT__<NAME>__TLS
        description: tLS configures file-path based transport security. When unset the server
    codeOnly:
      - option: WithHandler
        type: map[string]http.Handler
        description: registers a pre-built (path, handler) pair directly; spreads a
      - option: WithService
        type: '[]connect.ServiceRegistrar'
        description: 'is the recommended registrar: it defers handler construction to Init'
      - option: WithInterceptors
        type: '[]connect.Interceptor'
        description: appends extra connect interceptors to the built-in chain
  - category: http
    type: fiber
    package: github.com/Vilsol/lakta/pkg/http/fiber
    configPath: modules.http.fiber.<name>
    description: represents configuration for HTTP Fiber server [Module]
    fields:
      - key: host
        type: string
        default: 0.0.0.0
        envVar: LAKTA_MODULES__HTTP__FIBER__<NAME>__HOST
        description: host specifies the server's hostname or IP address to bind
      - key: port
        type: uint16
        default: "8080"
        envVar: LAKTA_MODULES__HTTP__FIBER__<NAME>__PORT
        description: port specifies the port number the server listens on
      - key: health_path
        type: string
        envVar: LAKTA_MODULES__HTTP__FIBER__<NAME>__HEALTH_PATH
        description: healthPath defines the endpoint path for the health check
      - key: tls
        type: config.TLS
        envVar: LAKTA_MODULES__HTTP__FIBER__<NAME>__TLS
        description: tLS configures file-path based transport security. When unset the server
    passthrough:
      targetType: Config
      targetPackage: github.com/gofiber/fiber/v3
      targetVersion: v3.3.0
      docsUrl: https://pkg.go.dev/github.com/gofiber/fiber/v3@v3.3.0#Config
    codeOnly:
      - option: WithDefaults
        type: '*fiber.Config'
        description: sets typed fiber.Config defaults that can be overridden by Raw/koanf values
      - option: WithTLSConfig
        type: '*tls.Config'
        description: sets an explicit *tls.Config, overriding TLS file config. Use
      - option: WithErrorHandler
        type: '*'
        description: sets the fiber.Config-level error handler (code-only)
      - option: WithStructValidator
        type: fiber.StructValidator
        description: sets the fiber.Config-level struct validator (code-only)
      - option: WithRouter
        type: '[]fiber.Router'
        description: adds router to the list of routers to be invoked (code-only)
      - option: WithRouterCtx
        type: '[]fiber.RouterCtx'
        description: adds a context-aware router (code-only). Its closure runs during
  - category: logging
    type: slog
    package: github.com/Vilsol/lakta/pkg/logging/slog
    configPath: modules.logging.slog.<name>
    description: represents configuration for slog [Module]
    fields:
      - key: level
        type: string
        default: info
        envVar: LAKTA_MODULES__LOGGING__SLOG__<NAME>__LEVEL
        description: level represents the default log level to be used in the configuration
      - key: levels
        type: map[string]string
        envVar: LAKTA_MODULES__LOGGING__SLOG__<NAME>__LEVELS
        description: levels defines a map of per-package log level overrides
      - key: global_default
        type: bool
        default: "true"
        envVar: LAKTA_MODULES__LOGGING__SLOG__<NAME>__GLOBAL_DEFAULT
        description: globalDefault indicates whether the logger should be set as the default globally
  - category: logging
    type: tint
    package: github.com/Vilsol/lakta/pkg/logging/tint
    configPath: modules.logging.tint.<name>
    description: represents configuration for Tint [Module]
    fields:
      - key: time_format
        type: string
        default: 2006-01-02T15:04:05Z07:00
        envVar: LAKTA_MODULES__LOGGING__TINT__<NAME>__TIME_FORMAT
        description: timeFormat specifies the format for timestamping log entries
    codeOnly:
      - option: WithWriter
        type: io.Writer
        description: sets the output writer (code-only, cannot be configured via files)
  - category: otel
    type: otel
    package: github.com/Vilsol/lakta/pkg/otel
    configPath: modules.otel.otel.<name>
    description: represents configuration for OTEL [Module]
    fields:
      - key: service_name
        type: string
        default: lakta
        envVar: LAKTA_MODULES__OTEL__OTEL__<NAME>__SERVICE_NAME
        description: serviceName specifies the OpenTelemetry service name
      - key: service_version
        type: string
        envVar: LAKTA_MODULES__OTEL__OTEL__<NAME>__SERVICE_VERSION
        description: serviceVersion is included as semconv.ServiceVersionKey in the resource
      - key: service_namespace
        type: string
        envVar: LAKTA_MODULES__OTEL__OTEL__<NAME>__SERVICE_NAMESPACE
        description: serviceNamespace is included as semconv.ServiceNamespaceKey in the resource
      - key: environment
        type: string
        envVar: LAKTA_MODULES__OTEL__OTEL__<NAME>__ENVIRONMENT
        description: environment is the deployment environment (e.g. "production", "staging")
      - key: endpoint
        type: string
        envVar: LAKTA_MODULES__OTEL__OTEL__<NAME>__ENDPOINT
        description: endpoint overrides the OTLP exporter endpoint. Empty uses the SDK default (env vars)
      - key: protocol
        type: string
        default: grpc
        envVar: LAKTA_MODULES__OTEL__OTEL__<NAME>__PROTOCOL
        description: 'protocol sets the OTLP transport: "grpc" (default), "http/protobuf", or "http/json"'
      - key: insecure
        type: bool
        envVar: LAKTA_MODULES__OTEL__OTEL__<NAME>__INSECURE
        description: insecure disables TLS on the OTLP connection — useful for local collectors
      - key: headers
        type: map[string]string
        envVar: LAKTA_MODULES__OTEL__OTEL__<NAME>__HEADERS
        description: headers are additional headers sent with every OTLP export (e.g. auth tokens)
      - key: sample_rate
        type: float64
        default: "1"
        envVar: LAKTA_MODULES__OTEL__OTEL__<NAME>__SAMPLE_RATE
        description: sampleRate sets the trace sampling ratio. 1.0 = always sample, 0.0 = never sample
      - key: metric_interval
        type: time.Duration
        default: 1m0s
        envVar: LAKTA_MODULES__OTEL__OTEL__<NAME>__METRIC_INTERVAL
        description: metricInterval sets the periodic metric export interval
      - key: runtime_interval
        type: time.Duration
        default: 1s
        envVar: LAKTA_MODULES__OTEL__OTEL__<NAME>__RUNTIME_INTERVAL
        description: runtimeInterval sets the minimum Go runtime stats collection interval
      - key: enabled
        type: bool
        default: "true"
        envVar: LAKTA_MODULES__OTEL__OTEL__<NAME>__ENABLED
        description: enabled controls whether OTEL is set up. When false, noop providers are registered
      - key: required
        type: bool
        envVar: LAKTA_MODULES__OTEL__OTEL__<NAME>__REQUIRED
        description: required makes telemetry setup failures fatal. When false (default), setup
      - key: signals
        type: '[]string'
        default: '[traces metrics logs]'
        envVar: LAKTA_MODULES__OTEL__OTEL__<NAME>__SIGNALS
        description: 'signals lists which telemetry signals to enable: "traces", "metrics", "logs"'
  - category: resilience
    type: policy
    package: github.com/Vilsol/lakta/pkg/resilience/policy
    configPath: modules.resilience.policy.<name>
    description: represents configuration for the resilience policy [Module]
    fields:
      - key: policies
        type: map[string]policy.PolicyConfig
        envVar: LAKTA_MODULES__RESILIENCE__POLICY__<NAME>__POLICIES
        description: policies defines the named policies this module manages. Prefer
    codeOnly:
      - option: WithPolicy
        type: map[string][]failsafe.Policy[interface {}]
        description: registers a policy chain in code (code-only), ordered outermost
  - category: workers
    type: pool
    package: github.com/Vilsol/lakta/pkg/workers/pool
    configPath: modules.workers.pool.<name>
    description: represents configuration for the worker pool [Module]
    fields:
      - key: pools
        type: map[string]pool.PoolConfig
        envVar: LAKTA_MODULES__WORKERS__POOL__<NAME>__POOLS
        description: pools defines the named pools this module manages. Prefer snake_case
    codeOnly:
      - option: WithPool
        type: map[string]pool.PoolConfig
        description: registers a pool in code (code-only); config with the same name
  - category: workers
    type: scheduler
    package: github.com/Vilsol/lakta/pkg/workers/scheduler
    configPath: modules.workers.scheduler.<name>
    description: 'is the worker-scheduler module config. Mirrors pool.Config: a config'
    fields:
      - key: timezone
        type: string
        default: UTC
        envVar: LAKTA_MODULES__WORKERS__SCHEDULER__<NAME>__TIMEZONE
        description: timezone is the scheduler-wide default location (IANA name). Per-job
      - key: jobs
        type: map[string]scheduler.JobSpec
        envVar: LAKTA_MODULES__WORKERS__SCHEDULER__<NAME>__JOBS
        description: jobs holds config-declared job overlays. Prefer snake_case names;
    codeOnly:
      - option: WithJob
        type: map[string]scheduler.JobSpec
        description: registers a code-owned job. Seeds CodeJobs[name] with Schedule +
  - category: workflows
    type: temporal
    package: github.com/Vilsol/lakta/pkg/workflows/temporal
    configPath: modules.workflows.temporal.<name>
    description: holds Temporal client and worker connection settings
    fields:
      - key: target
        type: string
        default: localhost:7233
        envVar: LAKTA_MODULES__WORKFLOWS__TEMPORAL__<NAME>__TARGET
        description: target specifies the Temporal server's target address for client connections
      - key: task_queue
        type: string
        required: true
        envVar: LAKTA_MODULES__WORKFLOWS__TEMPORAL__<NAME>__TASK_QUEUE
        description: taskQueue specifies the Temporal task queue name for workflow and activity execution
      - key: namespace
        type: string
        default: default
        envVar: LAKTA_MODULES__WORKFLOWS__TEMPORAL__<NAME>__NAMESPACE
        description: namespace defines the Temporal namespace to be used for client and worker operations
      - key: insecure
        type: bool
        envVar: LAKTA_MODULES__WORKFLOWS__TEMPORAL__<NAME>__INSECURE
        description: insecure indicates whether transport credentials should be bypassed, enabling an insecure connection
    codeOnly:
      - option: Credentials
        type: credentials.TransportCredentials
      - option: WithRegistrar
        type: '[]temporal.Registrar'
        description: adds a workflow/activity registrar (code-only)
