[tools]
go = "1.26.5"
golangci-lint = "2.12.2"
zig = "0.16.0"            # `zig cc` supplies the C linker the race detector needs (no system gcc required)
"go:github.com/bokwoon95/wgo" = "latest"

[tasks.dev]
dir = "{{ config_root }}"
description = "Live-reload an example service (mise run dev data); SIGTERM-forwarding keeps lakta graceful shutdown, last-good binary survives compile errors"
usage = '''
arg "[svc]" help="Example service under examples/microservices/" default="data"
'''
run = '''
svc="$usage_svc"
wgo -file '\.go$' go build -tags dev -o ./tmp/dev-$svc ./examples/microservices/$svc :: \
wgo -postpone -file "./tmp/dev-$svc" ./tmp/dev-$svc
'''

[tasks.lint]
run = "golangci-lint run"

[tasks.format]
run = "golangci-lint run --fix"

[tasks.test]
run = "go test ./..."

[tasks.test-race]
description = "Run tests with the race detector (zig cc supplies the C linker; no system gcc)"
env = { CGO_ENABLED = "1", CC = "zig cc", CXX = "zig c++" }
run = "go test -race -count=1 ./..."

[tasks.test-integration]
dir = "{{ config_root }}"
description = "Run DB + Temporal integration tests against real services (needs Docker + Postgres on localhost:5432 with test/test/test)"
env = { LAKTA_INTEGRATION = "1", CGO_ENABLED = "1", CC = "zig cc", CXX = "zig c++" }
run = """
set -e
( cd ./pkg/db/drivers/pgx && go test -race -count=1 ./... )
( cd ./pkg/db/sql && go test -race -count=1 ./... )
( cd ./pkg/workflows/temporal && go test -race -tags integration -count=1 ./... )
"""

[tasks.govulncheck]
run = "go run golang.org/x/vuln/cmd/govulncheck@latest ./..."

[tasks.doccheck]
dir = "{{ config_root }}"
run = "find docs/src/content/docs \\( -name '*.md' -o -name '*.mdx' \\) -print0 | xargs -0 go run ./cmd/doccheck"

[tasks.docgen]
dir = "{{ config_root }}"
run = "go generate ./cmd/docgen && go run ./cmd/docgen > docs.yaml"

[tasks.docgen-check]
dir = "{{ config_root }}"
depends = ["docgen"]
run = "git diff --exit-code -- docs.yaml cmd/docgen/configs_gen.go"

[tasks.schema]
dir = "{{ config_root }}"
description = "Regenerate the checked-in Draft 2020-12 JSON Schema (and its docs-site copy) from the built-in module configs"
run = """
go generate ./cmd/docgen
go run ./cmd/docgen -format=schema > lakta.schema.json
cp lakta.schema.json docs/public/lakta.schema.json
"""

[tasks.schema-check]
dir = "{{ config_root }}"
depends = ["schema"]
run = "git diff --exit-code -- lakta.schema.json docs/public/lakta.schema.json"

[tasks.apicheck]
dir = "{{ config_root }}"
run = "go run ./cmd/apicheck"

[tasks.verify-isolation]
dir = "{{ config_root }}"
description = "Core deps match the golden allowlist; integrations carry no sibling heavy deps"
run = """
set -e
GOWORK=off go list -m all | awk '{print $1}' | LC_ALL=C sort > "${TMPDIR:-/tmp}/lakta-core-deps.now"
if ! diff -u core-deps.golden "${TMPDIR:-/tmp}/lakta-core-deps.now"; then
  echo "CORE DEPS DRIFT: a dependency entered/left core. If intentional, regenerate core-deps.golden and review the diff."; exit 1
fi
# Integrations: PACKAGE-graph denylist (go list -deps) = what is actually COMPILED.
# Module-graph (go list -m all) is intentionally NOT used here: third-party libs like
# hellofresh/health-go bundle optional checker modules (pgx, grpc, ...) in their go.mod,
# so they show up in the module graph without ever being imported. We assert that a
# module never COMPILES another integration's unambiguous signature library.
check() { # dir, forbidden-import-path-regex
  if ( cd "$1" && GOWORK=off go list -deps ./... ) | grep -Eq "$2"; then
    echo "ISOLATION FAIL: $1 compiles $2"; exit 1
  fi
}
check pkg/http/fiber          'go.temporal.io/sdk|github.com/jackc/pgx|github.com/Masterminds/squirrel'
check pkg/grpc                'github.com/gofiber/fiber|go.temporal.io/sdk|github.com/jackc/pgx|github.com/Masterminds/squirrel'
check pkg/db/sql              'github.com/gofiber/fiber|go.temporal.io/sdk|github.com/jackc/pgx'
check pkg/db/drivers/pgx      'github.com/gofiber/fiber|go.temporal.io/sdk|github.com/Masterminds/squirrel'
check pkg/workflows/temporal  'github.com/gofiber/fiber|github.com/jackc/pgx|github.com/Masterminds/squirrel'
check pkg/otel                'github.com/gofiber/fiber|go.temporal.io/sdk|github.com/jackc/pgx|github.com/Masterminds/squirrel'
check pkg/health              'github.com/gofiber/fiber|go.temporal.io/sdk|github.com/jackc/pgx|github.com/Masterminds/squirrel'
check pkg/logging/slog        'github.com/gofiber/fiber|go.temporal.io/sdk|github.com/jackc/pgx|github.com/Masterminds/squirrel'
check pkg/logging/tint        'github.com/gofiber/fiber|go.temporal.io/sdk|github.com/jackc/pgx|github.com/Masterminds/squirrel|google.golang.org/grpc'
echo "isolation OK"
"""

[tasks.ci-all]
dir = "{{ config_root }}"
description = "Build, test, race, lint, vuln-check every workspace module"
env = { CGO_ENABLED = "1", CC = "zig cc", CXX = "zig c++" }
run = """
set -e
mods=$(go work edit -json | python3 -c 'import json,sys;[print(u["DiskPath"]) for u in json.load(sys.stdin)["Use"]]')
for d in $mods; do
  echo "== $d =="
  ( cd "$d" && go build ./... && go test ./... && go test -race ./... )
  case "$d" in
    ./examples/*) echo "   (demo module: skipping lint/govulncheck)" ;;
    *) ( cd "$d" && golangci-lint run ) && ( cd "$d" && go run golang.org/x/vuln/cmd/govulncheck@latest ./... ) ;;
  esac
done
"""
