[tools]
go = "1.26.5"
golangci-lint = "2.12.2"
zig = "0.16.0"            # `zig cc` supplies the C linker the race detector needs (no system gcc required)
buf = "1.71.0"           # proto lint/breaking/gen; local plugins only, no BSR at generate time
"go:github.com/bokwoon95/wgo" = "latest"
"go:google.golang.org/protobuf/cmd/protoc-gen-go" = "1.36.11"          # pinned (not latest) so dev and CI agree byte-for-byte
"go:connectrpc.com/connect/cmd/protoc-gen-connect-go" = "1.20.0"       # pinned (not latest) so dev and CI agree byte-for-byte
"go:golang.org/x/vuln/cmd/govulncheck" = "1.6.0"                       # pinned + installed once; ci-all reuses the binary instead of `go run ...@latest` per module

[tasks.dev]
dir = "{{ config_root }}"
description = "Live-reload an example service (mise run dev data); SIGTERM-forwarding keeps lakta graceful shutdown, last-good binary survives compile errors"
usage = '''
arg "[svc]" help="Example service under examples/microservices/" default="data"
'''
run = '''
svc="$usage_svc"
wgo -file '\.go$' go build -tags dev -o ./tmp/dev-$svc ./examples/microservices/$svc :: \
wgo -postpone -file "./tmp/dev-$svc" ./tmp/dev-$svc
'''

# golangci-lint's bare `./...` is module-scoped even under go.work, so linting
# from the root silently skips every pkg/* module. Passing each module's /...
# pattern explicitly makes one invocation cover the whole workspace (typecheck
# resolves via go.work). Examples are demo modules, excluded like in ci-all.
[tasks.lint]
dir = "{{ config_root }}"
description = "Lint every workspace module in one golangci-lint invocation"
shell = "bash -c"
run = """
golangci-lint run $(go work edit -json | python3 -c 'import json,sys;[print(u["DiskPath"]+"/...") for u in json.load(sys.stdin)["Use"] if not u["DiskPath"].startswith("./examples")]')
"""

[tasks.format]
dir = "{{ config_root }}"
description = "Auto-fix lint findings across every workspace module"
shell = "bash -c"
run = """
golangci-lint run --fix $(go work edit -json | python3 -c 'import json,sys;[print(u["DiskPath"]+"/...") for u in json.load(sys.stdin)["Use"] if not u["DiskPath"].startswith("./examples")]')
"""

[tasks.test]
run = "go test ./..."

[tasks.test-race]
description = "Run tests with the race detector (zig cc supplies the C linker; no system gcc)"
env = { CGO_ENABLED = "1", CC = "zig cc", CXX = "zig c++" }
run = "go test -race -count=1 ./..."

[tasks.test-integration]
dir = "{{ config_root }}"
description = "Run DB + Temporal integration tests against real services (needs Docker + Postgres on localhost:5432 with test/test/test)"
env = { LAKTA_INTEGRATION = "1", CGO_ENABLED = "1", CC = "zig cc", CXX = "zig c++" }
run = """
set -e
( cd ./pkg/db/drivers/pgx && go test -race -count=1 ./... )
( cd ./pkg/db/sql && go test -race -count=1 ./... )
( cd ./pkg/workflows/temporal && go test -race -tags integration -count=1 ./... )
"""

[tasks.govulncheck]
run = "go run golang.org/x/vuln/cmd/govulncheck@latest ./..."

[tasks.doccheck]
dir = "{{ config_root }}"
run = "find docs/src/content/docs \\( -name '*.md' -o -name '*.mdx' \\) -print0 | xargs -0 go run ./cmd/doccheck"

[tasks.docgen]
dir = "{{ config_root }}"
run = "go generate ./cmd/docgen && go run ./cmd/docgen > docs.yaml"

[tasks.docgen-check]
dir = "{{ config_root }}"
depends = ["docgen"]
run = "git diff --exit-code -- docs.yaml cmd/docgen/configs_gen.go"

[tasks.schema]
dir = "{{ config_root }}"
description = "Regenerate the checked-in Draft 2020-12 JSON Schema (and its docs-site copy) from the built-in module configs"
run = """
go generate ./cmd/docgen
go run ./cmd/docgen -format=schema > lakta.schema.json
cp lakta.schema.json docs/public/lakta.schema.json
"""

[tasks.schema-check]
dir = "{{ config_root }}"
depends = ["schema"]
run = "git diff --exit-code -- lakta.schema.json docs/public/lakta.schema.json"

[tasks.apicheck]
dir = "{{ config_root }}"
run = "go run ./cmd/apicheck"

[tasks.verify-isolation]
dir = "{{ config_root }}"
description = "Core deps match the golden allowlist; integrations carry no sibling heavy deps"
run = """
set -e
# go list output goes to a file first: in a `cmd | awk | sort` pipeline the shell
# only sees sort's exit status, so a go failure (e.g. missing go.sum entry) would
# silently produce an empty list and misreport as 100 lines of "drift".
raw="${TMPDIR:-/tmp}/lakta-core-deps.raw"
if ! GOWORK=off go list -m all > "$raw"; then
  echo "verify-isolation: 'go list -m all' failed (see error above); not a dependency drift."; exit 1
fi
awk '{print $1}' "$raw" | LC_ALL=C sort > "${TMPDIR:-/tmp}/lakta-core-deps.now"
if ! diff -u core-deps.golden "${TMPDIR:-/tmp}/lakta-core-deps.now"; then
  echo "CORE DEPS DRIFT: a dependency entered/left core. If intentional, regenerate core-deps.golden and review the diff."; exit 1
fi
# Integrations: PACKAGE-graph denylist (go list -deps) = what is actually COMPILED.
# Module-graph (go list -m all) is intentionally NOT used here: third-party libs like
# hellofresh/health-go bundle optional checker modules (pgx, grpc, ...) in their go.mod,
# so they show up in the module graph without ever being imported. We assert that a
# module never COMPILES another integration's unambiguous signature library.
check() { # dir, forbidden-import-path-regex
  deps=$( cd "$1" && GOWORK=off go list -deps ./... ) || {
    echo "verify-isolation: 'go list -deps' failed in $1 (see error above); the isolation check cannot run."; exit 1
  }
  if printf '%s\\n' "$deps" | grep -Eq "$2"; then
    echo "ISOLATION FAIL: $1 compiles $2"; exit 1
  fi
}
check pkg/http/fiber          'go.temporal.io/sdk|github.com/jackc/pgx|github.com/Masterminds/squirrel'
check pkg/grpc                'github.com/gofiber/fiber|go.temporal.io/sdk|github.com/jackc/pgx|github.com/Masterminds/squirrel'
check pkg/db/sql              'github.com/gofiber/fiber|go.temporal.io/sdk|github.com/jackc/pgx'
check pkg/db/drivers/pgx      'github.com/gofiber/fiber|go.temporal.io/sdk|github.com/Masterminds/squirrel'
check pkg/workflows/temporal  'github.com/gofiber/fiber|github.com/jackc/pgx|github.com/Masterminds/squirrel'
check pkg/otel                'github.com/gofiber/fiber|go.temporal.io/sdk|github.com/jackc/pgx|github.com/Masterminds/squirrel'
check pkg/health              'github.com/gofiber/fiber|go.temporal.io/sdk|github.com/jackc/pgx|github.com/Masterminds/squirrel'
check pkg/logging/slog        'github.com/gofiber/fiber|go.temporal.io/sdk|github.com/jackc/pgx|github.com/Masterminds/squirrel'
check pkg/logging/tint        'github.com/gofiber/fiber|go.temporal.io/sdk|github.com/jackc/pgx|github.com/Masterminds/squirrel|google.golang.org/grpc'
echo "isolation OK"
"""

[tasks.ci-all]
dir = "{{ config_root }}"
description = "Build, test, race, lint, vuln-check every workspace module (parallel across cores)"
env = { CGO_ENABLED = "1", CC = "zig cc", CXX = "zig c++" }
# The script needs bash (pipefail, export -f); mise's default `sh` is dash on
# Ubuntu runners, which rejects `set -o pipefail`.
shell = "bash -c"
run = """
set -uo pipefail
# mise runs task scripts under errexit; disable it so a failing xargs pipeline does
# not abort before the log-replay + proto steps run (we exit non-zero explicitly at
# the end). The per-module worker subshells keep their own `set -e`.
set +e

# Persistent, per-(worktree,module) golangci-lint caches under the shared .git
# common dir: kept out of the working tree (never committed); the per-worktree
# subdir avoids the cross-worktree stale-path contamination the default cache
# suffers (phantom findings referencing other worktrees' paths). Each module gets
# its own cache dir so the parallel workers don't race a shared cache.
gitcommon=$(cd "$(git rev-parse --git-common-dir)" && pwd)
lintcache="$gitcommon/golangci-lint-cache/$(basename "$PWD")"
export lintcache

mods=$(go work edit -json | python3 -c 'import json,sys;[print(u["DiskPath"]) for u in json.load(sys.stdin)["Use"]]')

logdir=$(mktemp -d)
trap 'rm -rf "$logdir"' EXIT
export logdir

# One worker = full check suite for one module. Output is captured to a per-module
# logfile so parallel workers never interleave; only a one-line PASS/FAIL marker
# streams live to stderr. Exit status propagates so xargs can fail the whole task.
# golangci-lint takes a GLOBAL lock and aborts on a concurrent instance, so we pass
# --allow-parallel-runners (safe here: each run has its own per-module cache dir).
check_module() {
  d="$1"
  key="$(printf '%s' "$d" | tr '/.' '__')"
  log="$logdir/$key.log"
  (
    set -e
    cd "$d"
    go build ./...
    go test ./...
    go test -race ./...
    case "$d" in
      ./examples/*) echo "   (demo module: skipping lint/govulncheck)" ;;
      *)
        GOLANGCI_LINT_CACHE="$lintcache/$key" golangci-lint run --allow-parallel-runners
        # ci-min sets LAKTA_SKIP_VULN: vulns surface with time, not code
        # changes, so the local gate skips the per-module network fetch.
        if [ "${LAKTA_SKIP_VULN:-0}" != "1" ]; then govulncheck ./...; fi
        ;;
    esac
  ) >"$log" 2>&1
  status=$?
  if [ "$status" -eq 0 ]; then printf 'PASS  %s\n' "$d" >&2; else printf 'FAIL  %s\n' "$d" >&2; fi
  return "$status"
}
export -f check_module

# xargs -P fans out across all cores; it exits non-zero if ANY worker failed,
# which is our fail-fast overall exit-code signal.
printf '%s\n' $mods | xargs -P "$(nproc)" -I {} bash -c 'check_module "$@"' _ {}
mod_status=$?

# Replay captured logs in deterministic workspace order (full build/test/lint/vuln
# output for every module, exactly as the sequential version printed inline).
for d in $mods; do
  echo "== $d =="
  cat "$logdir/$(printf '%s' "$d" | tr '/.' '__').log"
done

proto_status=0
if command -v buf >/dev/null 2>&1; then
  echo "== proto lint + breaking =="
  ( cd examples/microservices/proto && buf lint && buf breaking --against "$(git rev-parse --git-common-dir)#branch=origin/main,subdir=examples/microservices/proto" ) || proto_status=$?
else
  echo "   (buf absent: skipping proto-lint/proto-breaking)"
fi

if [ "$mod_status" -ne 0 ] || [ "$proto_status" -ne 0 ]; then
  echo "ci-all FAILED (module checks exit=$mod_status, proto exit=$proto_status)" >&2
  exit 1
fi
echo "ci-all OK"
"""

[tasks.ci-min]
dir = "{{ config_root }}"
description = "ci-all without govulncheck — local gate (vulns drift with time, not code changes)"
env = { LAKTA_SKIP_VULN = "1" }
run = "mise run ci-all"

[tasks.proto-gen]
dir = "{{ config_root }}/examples/microservices/proto"
description = "Generate Go + Connect stubs from proto (offline, local plugins)"
run = "buf generate"

[tasks.proto-lint]
dir = "{{ config_root }}/examples/microservices/proto"
description = "Lint proto files (STANDARD ruleset)"
run = "buf lint"

[tasks.proto-breaking]
dir = "{{ config_root }}/examples/microservices/proto"
description = "Check proto for wire-breaking changes against main"
# git-common-dir resolves the real repo .git in both normal checkouts and git worktrees
# (a worktree's .git is a gitfile buf cannot clone directly).
run = 'buf breaking --against "$(git rev-parse --git-common-dir)#branch=origin/main,subdir=examples/microservices/proto"'

[tasks.migrate]
dir = "{{ config_root }}/examples/microservices"
description = "Run DB migrations out-of-band (init-container / prod path) for the data service"
run = "go run ./data migrate"
